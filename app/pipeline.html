<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pipeline - YTConsole</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="pipeline.css" />
</head>
<body class="pl-page">
  <header class="pl-topbar">
    <div class="pl-brand-wrap">
      <a href="../index.html" class="pl-brand">PrimeYearsHealth | Pipeline</a>
    </div>

    <div class="pl-top-actions">
      <div class="pl-view-switch" role="tablist" aria-label="Pipeline gorunumu">
        <button id="viewActiveBtn" class="pl-pill is-active" type="button">Active</button>
        <button id="viewArchivedBtn" class="pl-pill" type="button">Archived</button>
      </div>

      <button id="orderModeBtn" class="pl-pill" type="button" title="Siralama modu">
        <span id="orderModeLabel">Manual order</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </button>
      <button id="resetOrderBtn" class="pl-pill" type="button">Reset order</button>
      <button id="newTaskBtn" class="pl-primary-btn" type="button">New task</button>
      <button class="btn-icon" id="themeToggle" type="button" title="Tema Degistir">
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
      </button>
    </div>
  </header>

  <section id="pipelineNotice" class="pl-notice" hidden></section>

  <main class="pl-board-wrap">
    <div class="pl-board" id="pipelineBoard">
      <section class="pl-column pl-col-title" data-stage="title">
        <header class="pl-column-head">
          <h2>Title &amp; Description</h2>
          <button class="pl-col-menu" type="button" aria-label="Kolon menusu">···</button>
        </header>
        <div class="pl-column-list" data-stage="title"></div>
      </section>

      <section class="pl-column pl-col-edit" data-stage="edit">
        <header class="pl-column-head">
          <h2>Edit</h2>
          <button class="pl-col-menu" type="button" aria-label="Kolon menusu">···</button>
        </header>
        <div class="pl-column-list" data-stage="edit"></div>
      </section>

      <section class="pl-column pl-col-script" data-stage="script">
        <header class="pl-column-head">
          <h2>Script</h2>
          <button class="pl-col-menu" type="button" aria-label="Kolon menusu">···</button>
        </header>
        <div class="pl-column-list" data-stage="script"></div>
      </section>

      <section class="pl-column pl-col-thumbnail" data-stage="thumbnail">
        <header class="pl-column-head">
          <h2>Thumbnail</h2>
          <button class="pl-col-menu" type="button" aria-label="Kolon menusu">···</button>
        </header>
        <div class="pl-column-list" data-stage="thumbnail"></div>
      </section>

      <section class="pl-column pl-col-publish" data-stage="publish">
        <header class="pl-column-head">
          <h2>Publish</h2>
          <button class="pl-col-menu" type="button" aria-label="Kolon menusu">···</button>
        </header>
        <div class="pl-column-list" data-stage="publish"></div>
      </section>
    </div>
  </main>

  <div id="taskModal" class="pl-modal" aria-hidden="true">
    <div class="pl-modal-card" role="dialog" aria-modal="true" aria-labelledby="taskModalTitle">
      <div class="pl-modal-head">
        <h3 id="taskModalTitle">Edit Task</h3>
        <button id="closeTaskModalBtn" class="pl-close" type="button">Close</button>
      </div>

      <form id="taskForm" class="pl-modal-content">
        <aside class="pl-modal-left">
          <div class="pl-thumb-label">Thumbnail</div>
          <div class="pl-thumb-actions">
            <button type="button" id="thumbUploadBtn" class="pl-mini-btn">Upload</button>
            <button type="button" id="thumbOpenBtn" class="pl-mini-btn">Open</button>
            <button type="button" id="thumbDownloadBtn" class="pl-mini-btn">Download</button>
            <button type="button" id="thumbCopyBtn" class="pl-mini-btn">Copy link</button>
            <button type="button" id="thumbRemoveBtn" class="pl-mini-btn danger">Remove</button>
          </div>
          <input id="thumbFileInput" type="file" accept="image/*" hidden />
          <div class="pl-thumb-preview-wrap">
            <img id="thumbPreview" class="pl-thumb-preview" alt="Thumbnail preview" />
            <div id="thumbEmpty" class="pl-thumb-empty">No thumbnail</div>
          </div>
        </aside>

        <section class="pl-modal-right">
          <div class="pl-field">
            <label for="taskTitleInput">Title</label>
            <input id="taskTitleInput" type="text" required placeholder="Task title" />
          </div>

          <div class="pl-status-grid" id="statusGrid"></div>

          <div class="pl-inline-fields">
            <div class="pl-field">
              <label for="scheduledDateInput">Scheduled Date</label>
              <input id="scheduledDateInput" type="date" />
            </div>
            <div class="pl-field">
              <label for="taskStageSelect">Stage</label>
              <select id="taskStageSelect">
                <option value="title">Title & Description</option>
                <option value="edit">Edit</option>
                <option value="script">Script</option>
                <option value="thumbnail">Thumbnail</option>
                <option value="publish">Publish</option>
              </select>
            </div>
          </div>

          <div class="pl-field">
            <label for="videoUrlInput">Video File URL</label>
            <input id="videoUrlInput" type="url" placeholder="https://drive.google.com/..." />
          </div>

          <div class="pl-script-head">
            <span>Script</span>
            <button type="button" id="mockAiBtn" class="pl-mini-btn">Sensei AI</button>
          </div>

          <div class="pl-inline-fields three">
            <select id="channelStyleSelect">
              <option>Documentary</option>
              <option>Health Tips</option>
              <option>Short Story</option>
            </select>
            <select id="targetAudienceSelect">
              <option>Informative</option>
              <option>General</option>
              <option>Professionals</option>
            </select>
            <select id="scriptLengthSelect">
              <option>Medium</option>
              <option>Short</option>
              <option>Long</option>
            </select>
          </div>

          <div class="pl-field">
            <textarea id="scriptInput" rows="5" placeholder="Write or generate your script..."></textarea>
          </div>

          <div class="pl-inline-fields">
            <div class="pl-field">
              <label for="audioUrlInput">Audio URL</label>
              <input id="audioUrlInput" type="url" placeholder="https://..." />
            </div>
            <div class="pl-field">
              <label for="thumbUrlInput">Thumbnail URL</label>
              <input id="thumbUrlInput" type="url" placeholder="https://..." />
            </div>
          </div>

          <div class="pl-field">
            <label for="seoInput">SEO Description</label>
            <textarea id="seoInput" rows="3" placeholder="SEO description..."></textarea>
          </div>

          <div class="pl-modal-actions">
            <button class="pl-primary-btn" type="submit">Save</button>
          </div>
        </section>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="shared-navbar.js"></script>
  <script src="pipeline.js"></script>
</body>
</html>
