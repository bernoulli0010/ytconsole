<!doctype html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rakipler - YTConsole</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .competitor-grid {
      display: grid;
      gap: 16px;
    }
    
    .competitor-card {
      background: var(--bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .competitor-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    
    .competitor-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      cursor: pointer;
    }
    
    .competitor-thumb {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--border-light);
    }
    
    .competitor-info {
      flex: 1;
      min-width: 0;
    }
    
    .competitor-name {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .competitor-stats {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: var(--text-muted);
    }
    
    .competitor-stat {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .competitor-stat svg {
      width: 14px;
      height: 14px;
    }
    
    .competitor-actions {
      display: flex;
      gap: 8px;
    }
    
    .btn-icon-sm {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-xs);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
    }
    
    .btn-icon-sm:hover {
      background: var(--danger-bg);
      color: var(--danger);
      border-color: var(--danger);
    }
    
    .competitor-videos {
      padding: 0 16px 16px;
      display: none;
    }
    
    .competitor-videos.is-open {
      display: block;
    }
    
    .videos-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    
    .videos-title {
      font-weight: 600;
      font-size: 14px;
    }
    
    .time-filter {
      display: flex;
      gap: 6px;
    }
    
    .filter-btn {
      padding: 4px 10px;
      border-radius: var(--radius-xs);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    
    .filter-btn.is-active {
      background: var(--brand);
      color: white;
      border-color: var(--brand);
    }
    
    .video-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .video-item {
      display: flex;
      gap: 12px;
      padding: 10px;
      background: var(--bg-page);
      border-radius: var(--radius-xs);
      cursor: pointer;
      transition: background 0.15s;
    }
    
    .video-item:hover {
      background: var(--border-light);
    }
    
    .video-thumb {
      width: 120px;
      height: 68px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
    }
    
    .video-info {
      flex: 1;
      min-width: 0;
    }
    
    .video-title {
      font-weight: 600;
      font-size: 13px;
      line-height: 1.4;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .video-stats {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: var(--text-muted);
    }
    
    .video-stat {
      display: flex;
      align-items: center;
      gap: 3px;
    }
    
    .video-stat svg {
      width: 12px;
      height: 12px;
    }
    
    .add-form {
      background: var(--bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 20px;
      margin-bottom: 24px;
    }
    
    .add-form-title {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .add-form-title svg {
      color: var(--brand);
    }
    
    .form-row {
      display: flex;
      gap: 12px;
    }
    
    .input-group {
      flex: 1;
    }
    
    .input-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text-muted);
    }
    
    .form-input {
      width: 100%;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-page);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--brand-light);
    }
    
    .form-input::placeholder {
      color: var(--text-faint);
    }
    
    .token-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    
    .token-text {
      font-size: 13px;
      color: var(--text-muted);
    }
    
    .token-text strong {
      color: var(--brand);
    }
    
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      background: var(--bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    
    .empty-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      color: var(--text-faint);
    }
    
    .empty-title {
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 8px;
    }
    
    .empty-desc {
      color: var(--text-muted);
      font-size: 14px;
    }
    
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s;
    }
    
    .loading-overlay.is-visible {
      opacity: 1;
      visibility: visible;
    }
    
    .loading-box {
      background: var(--bg);
      padding: 24px 32px;
      border-radius: var(--radius);
      text-align: center;
    }
    
    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      font-size: 14px;
      color: var(--text-muted);
    }
    
    .login-required {
      text-align: center;
      padding: 48px 24px;
      background: var(--bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    
    .login-required svg {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      color: var(--text-faint);
    }
    
    .login-required h2 {
      font-size: 18px;
      margin-bottom: 8px;
    }
    
    .login-required p {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 20px;
    }
    
    .header-stats {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
    }
    
    .header-stats strong {
      color: var(--text);
    }
  </style>
</head>

<body>
  <header class="header">
    <div class="container header-inner">
      <a href="../index.html" class="brand">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31.4 31.4 0 0 0 0 12a31.4 31.4 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31.4 31.4 0 0 0 24 12a31.4 31.4 0 0 0-.5-5.8z" fill="#fff"/>
            <path d="M9.6 15.6V8.4l6.4 3.6-6.4 3.6z" fill="#6B1D2A"/>
          </svg>
        </div>
        <div>
          <div class="brand-title">Rakipler</div>
          <div class="brand-sub">YTConsole</div>
        </div>
      </a>
      <div class="header-actions">
        <div class="header-stats" id="competitorCount" style="display: none;">
          <span>Rakip:</span>
          <strong id="competitorCountNum">0</strong>
          <span>/10</span>
        </div>
        <a href="../index.html" class="btn-secondary mini">Ana Sayfa</a>
        <button class="btn-icon" id="themeToggle" type="button" title="Tema Değiştir">
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="container main">
    <div id="authGuest" class="login-required" style="display: none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <h2>Giriş Gerekli</h2>
      <p>Rakip kanalları analiz etmek için giriş yapmalısınız.</p>
      <a href="../index.html" class="btn-primary">Giriş Yap</a>
    </div>

    <div id="authUser" style="display: none;">
      <div class="add-form">
        <div class="add-form-title">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
          Yeni Rakip Ekle
        </div>
        <div class="form-row">
          <div class="input-group">
            <label class="input-label">YouTube Kanal URL veya Kullanıcı Adı</label>
            <input type="text" class="form-input" id="channelInput" placeholder="@kanaladi veya https://youtube.com/@kanaladi" />
          </div>
          <div style="display: flex; align-items: flex-end;">
            <button class="btn-primary" id="addCompetitorBtn" type="button">Ekle (2 Token)</button>
          </div>
        </div>
        <div class="token-info">
          <span class="token-text">Mevcut Token: <strong id="userTokens">0</strong></span>
          <span class="token-text" id="competitorLimitText">Takip edilen: 0/10</span>
        </div>
      </div>

      <div id="competitorList"></div>
    </div>
  </main>

  <footer class="container footer">
    <div class="footer-left">
      <span>YTConsole © 2026</span>
    </div>
  </footer>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-box">
      <div class="loading-spinner"></div>
      <div class="loading-text" id="loadingText">Yükleniyor...</div>
    </div>
  </div>

  <script src="shared-navbar.js"></script>
  <script>
    const SUPABASE_URL = "https://bjcsbuvjumaigvsjphor.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Ws-ubr-U3Uryo-oJxE0rvg_QTlz2Kqa";

    let supabaseClient = null;
    let competitors = [];
    let currentUser = null;

    const $ = (id) => document.getElementById(id);

    function initSupabase() {
      if (window.supabase) {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      }
    }

    function formatNumber(num) {
      if (!num) return '0';
      if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
      if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
      return num.toString();
    }

    function showLoading(text = 'Yükleniyor...') {
      $('loadingText').textContent = text;
      $('loadingOverlay').classList.add('is-visible');
    }

    function hideLoading() {
      $('loadingOverlay').classList.remove('is-visible');
    }

    function toast(message) {
      alert(message);
    }

    async function fetchCompetitors() {
      if (!supabaseClient) {
        initSupabase();
      }
      
      let { data: { session } } = await supabaseClient.auth.getSession();
      
      // If no session, try to refresh
      if (!session) {
        const { data: refreshData } = await supabaseClient.auth.refreshSession();
        session = refreshData.session;
      }
      
      if (!session) {
        $('authGuest').style.display = 'block';
        $('authUser').style.display = 'none';
        return;
      }

      currentUser = session.user;
      
      const { data: profile } = await supabaseClient
        .from('profiles')
        .select('token_balance')
        .eq('id', currentUser.id)
        .single();

      $('userTokens').textContent = profile?.token_balance || 0;
      $('authGuest').style.display = 'none';
      $('authUser').style.display = 'block';

      showLoading('Rakipler yükleniyor...');
      
      try {
        const response = await fetch(`${SUPABASE_URL}/functions/v1/fetch-all-competitors`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${session.access_token}`,
            'apikey': SUPABASE_KEY
          },
          body: JSON.stringify({})
        });

        const data = await response.json();
        console.log('Fetch competitors response:', response.status, data);
        
        if (data.success) {
          competitors = data.competitors || [];
          renderCompetitors();
          $('competitorCount').style.display = 'flex';
          $('competitorCountNum').textContent = competitors.length;
          $('competitorLimitText').textContent = `Takip edilen: ${competitors.length}/10`;
        } else {
          console.error('Competitor error:', data.error);
          toast(data.error || 'Rakipler yüklenirken hata oluştu');
        }
      } catch (error) {
        console.error('Fetch competitors error:', error);
        toast('Bağlantı hatası');
      } finally {
        hideLoading();
      }
    }

    function renderCompetitors() {
      const container = $('competitorList');
      
      if (competitors.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            <h3 class="empty-title">Henüz Rakip Eklenmedi</h3>
            <p class="empty-desc">Yukarıdaki formu kullanarak rakip kanallar ekleyebilir ve analiz edebilirsiniz.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = competitors.map(comp => `
        <div class="competitor-card" data-channel-id="${comp.id}">
          <div class="competitor-header" onclick="toggleVideos('${comp.id}')">
            <img class="competitor-thumb" src="${comp.thumbnail_url || 'https://yt3.ggpht.com/ytc/default'}" alt="${comp.channel_name}" onerror="this.src='https://yt3.ggpht.com/ytc/default'" />
            <div class="competitor-info">
              <div class="competitor-name">${comp.channel_name || 'Bilinmeyen Kanal'}</div>
              <div class="competitor-stats">
                <span class="competitor-stat">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                  </svg>
                  ${formatNumber(comp.subscribers)} abone
                </span>
                <span class="competitor-stat">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                  ${formatNumber(comp.total_views)} izlenme
                </span>
                <span class="competitor-stat">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="23 7 16 12 23 17 23 7"/>
                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
                  </svg>
                  ${comp.video_count || 0} video
                </span>
              </div>
            </div>
            <div class="competitor-actions">
              <button class="btn-icon-sm" onclick="event.stopPropagation(); removeCompetitor('${comp.id}', '${comp.channel_name}')" title="Sil">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="competitor-videos" id="videos-${comp.id}">
            <div class="videos-header">
              <span class="videos-title">Son Videolar</span>
              <div class="time-filter">
                <button class="filter-btn is-active" data-filter="all" onclick="filterVideos('${comp.id}', 'all')">Tümü</button>
                <button class="filter-btn" data-filter="week" onclick="filterVideos('${comp.id}', 'week')">Bu Hafta</button>
                <button class="filter-btn" data-filter="month" onclick="filterVideos('${comp.id}', 'month')">Bu Ay</button>
              </div>
            </div>
            <div class="video-list" id="video-list-${comp.id}">
              ${renderVideos(comp.videos || [])}
            </div>
          </div>
        </div>
      `).join('');
    }

    function renderVideos(videos) {
      if (!videos || videos.length === 0) {
        return '<p style="color: var(--text-muted); font-size: 13px;">Video bulunamadı</p>';
      }

      return videos.map(video => `
        <div class="video-item" onclick="window.open('https://youtube.com/watch?v=${video.video_id}', '_blank')">
          <img class="video-thumb" src="${video.thumbnail_url}" alt="${video.title}" />
          <div class="video-info">
            <div class="video-title">${video.title || 'Başlıksız Video'}</div>
            <div class="video-stats">
              <span class="video-stat">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                ${formatNumber(video.views)}
              </span>
              <span class="video-stat">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/>
                </svg>
                ${formatNumber(video.likes)}
              </span>
              <span class="video-stat">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
                ${formatNumber(video.comments)}
              </span>
            </div>
          </div>
        </div>
      `).join('');
    }

    function toggleVideos(channelId) {
      const videosSection = $('videos-' + channelId);
      if (videosSection) {
        videosSection.classList.toggle('is-open');
      }
    }

    function filterVideos(channelId, filter) {
      const comp = competitors.find(c => c.id === channelId);
      if (!comp) return;

      const buttons = document.querySelectorAll(`#videos-${channelId} .filter-btn`);
      buttons.forEach(btn => {
        btn.classList.toggle('is-active', btn.dataset.filter === filter);
      });

      let filteredVideos = comp.videos || [];
      
      if (filter === 'week') {
        const weekAgo = new Date();
        weekAgo.setDate(weekAgo.getDate() - 7);
        filteredVideos = filteredVideos.filter(v => new Date(v.published_at) > weekAgo);
      } else if (filter === 'month') {
        const monthAgo = new Date();
        monthAgo.setMonth(monthAgo.getMonth() - 1);
        filteredVideos = filteredVideos.filter(v => new Date(v.published_at) > monthAgo);
      }

      const videoList = $('video-list-' + channelId);
      if (videoList) {
        videoList.innerHTML = renderVideos(filteredVideos);
      }
    }

    async function addCompetitor() {
      const channelInput = $('channelInput');
      const query = channelInput.value.trim();

      if (!query) {
        toast('Lütfen bir kanal URL veya kullanıcı adı girin');
        return;
      }

      if (!supabaseClient) {
        initSupabase();
      }

      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        toast('Lütfen giriş yapın');
        return;
      }

      showLoading('Kanal ekleniyor...');

      try {
        const response = await fetch(`${SUPABASE_URL}/functions/v1/add-competitor`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${session.access_token}`,
            'apikey': SUPABASE_KEY
          },
          body: JSON.stringify({ query })
        });

        const data = await response.json();

        if (data.success) {
          channelInput.value = '';
          $('userTokens').textContent = data.new_token_balance;
          
          competitors.unshift(data.channel);
          renderCompetitors();
          $('competitorCountNum').textContent = competitors.length;
          $('competitorLimitText').textContent = `Takip edilen: ${competitors.length}/10`;
          
          toast(`${data.channel.channel_name} başarıyla eklendi!`);
        } else {
          if (data.code === 'INSUFFICIENT_TOKENS') {
            toast('Yetersiz token! Rakip eklemek için en az 2 token gerekli.');
          } else if (data.code === 'LIMIT_REACHED') {
            toast('Maksimum rakip sayısına ulaştınız (10).');
          } else if (data.code === 'ALREADY_EXISTS') {
            toast(data.error);
          } else {
            toast(data.error || 'Kanal eklenirken hata oluştu');
          }
        }
      } catch (error) {
        console.error('Add competitor error:', error);
        toast('Bağlantı hatası');
      } finally {
        hideLoading();
      }
    }

    async function removeCompetitor(channelId, channelName) {
      if (!confirm(`${channelName} kanalını silmek istediğinize emin misiniz?`)) {
        return;
      }

      if (!supabaseClient) {
        initSupabase();
      }

      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        toast('Lütfen giriş yapın');
        return;
      }

      showLoading('Kanal siliniyor...');

      try {
        const response = await fetch(`${SUPABASE_URL}/functions/v1/remove-competitor`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${session.access_token}`,
            'apikey': SUPABASE_KEY
          },
          body: JSON.stringify({ channel_id: channelId })
        });

        const data = await response.json();

        if (data.success) {
          competitors = competitors.filter(c => c.id !== channelId);
          renderCompetitors();
          $('competitorCountNum').textContent = competitors.length;
          $('competitorLimitText').textContent = `Takip edilen: ${competitors.length}/10`;
          toast(data.message);
        } else {
          toast(data.error || 'Kanal silinirken hata oluştu');
        }
      } catch (error) {
        console.error('Remove competitor error:', error);
        toast('Bağlantı hatası');
      } finally {
        hideLoading();
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      initSupabase();
      
      $('addCompetitorBtn').addEventListener('click', addCompetitor);
      
      $('channelInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          addCompetitor();
        }
      });

      fetchCompetitors();
    });
  </script>
</body>

</html>
